model: "swd_dualvae"

downsample_factor: 8
latent_channels: 8          # C — the one shared space (replaces codebook_dim)
swd_num_projections: 512 # (or 1024) The number of random 1D slices $K$.

num_embeddings: 256
combine_mode: "residual_addition" # Options: "cross_attention" or "residual_addition"
l2_normalize_codes: false   # flip to true if perplexity stays low
initialize_from_data: True  # if true, seed the codebook via k-means on one encoder batch instead of uniform init
cont_dropout_p: 0.0  # Continuous-branch dropout rate. 0.0 disables it (default, no mask code path).
                     # A value in (0, 1), e.g. 0.3, zeroes the continuous branch for that fraction
                     # of samples per batch (combine step only), forcing the decoder to sometimes
                     # reconstruct from VQ codes alone so the codebook becomes load-bearing.
                     # 1.0 is invalid: that trains a pure VQ-VAE with a dead SWD loss attached --
                     # use configs/vqvae.yaml instead.
continuous_mode: "deterministic"  # Options: "learned_variance" (default) -- the vanilla branch predicts
                     # (mean, log_variance) and samples z via the reparameterization trick.
                     # "deterministic" -- the vanilla branch is a plain deterministic projection (no
                     # mean/logvar split, no noise, no reparameterization); the SWD loss alone shapes
                     # the aggregate distribution (WAE/SWAE-style ablation). log_variance is None in
                     # this mode, so the variance-budget term is skipped and only the SWD shape term
                     # applies.

swd_weight: 1 # To scale the shape loss. before it was: 0.05
variance_budget_lambda: 0.02 # it was before 0.02
variance_weight: 1.0 # To scale the budget loss.
# --- SWAE ablation (fixed-sigma0, un-whitened SWD, no floor/KL) ---
# 0 (or absent) = original behavior: whitened SWD to N(0, I) + variance_budget floor
#   (uses variance_budget_lambda / variance_weight / component_prior above).
# > 0 = SWAE recipe: match the UN-whitened residual Delta to a FIXED N(0, sigma0^2 I).
#   The fixed target is the sole scale anchor, so the variance floor AND the
#   per-component whitening are disabled (variance_budget_lambda / component_prior
#   are ignored). Keep sigma0 well under the codeword spacing (~1.0) so mixture
#   components stay separable; 0.25 is a sane start. Run with
#   continuous_mode: "deterministic" so no free per-sample variance floats outside
#   the aggregate SWD constraint.
swd_sigma0: 0.25
swd_mode: "per_location" # "per_location" (one sample per spatial position, matches the VQ branch's quantization unit) or "global" (one sample per image, the original behavior).

# --- Wavelet detail branch (single-level Haar; frequency-band variance) ---
# Addresses the diagnosis that fine detail dies in the encoder's strided downsampling
# BEFORE the continuous branch (which encodes only the post-compression residual) can
# see it. When true, the continuous branch instead encodes the PRE-compression high-
# frequency Haar subbands (LH/HL/HH), so Delta finally carries real fine detail.
# REQUIRES continuous_mode: "deterministic" and combine_mode: "residual_addition"
# (both already set above). The base VQ path is unchanged.
wavelet_detail: True
# How to split latent_channels across the 3 bands [LH, HL, HH]; must sum to latent_channels.
# null -> auto even split (C=8 -> [3,3,2]). The channel grouping is what makes per-band
# variance well-defined.
wavelet_band_channels: null
# Per-band sigma0 [LH, HL, HH]. When learned_band_variance is false this is the FIXED
# per-band SWD target (safe, non-self-referential). When learned_band_variance is true it
# becomes the PRIOR MEAN the MAP estimate shrinks toward. Diagonal HH usually < LH/HL.
swd_sigma0_bands: [0.25, 0.25, 0.15]

# --- MAP-EM learned per-(code, band) variance (ablation; requires wavelet_detail) ---
# false = fixed per-band sigma0 above (the proven, stable choice).
# true  = the GMM component covariances are LEARNED by EM: sigma2_{k,band} is the EMA
#   M-step estimate shrunk (conjugate inverse-gamma) toward swd_sigma0_bands with
#   pseudo-count kappa. Used as a DETACHED per-location whitening (stop-gradient -> the
#   SWD can't game its own scale). Heteroscedastic mixture; more expressive latent.
learned_band_variance: false
# kappa anneals large->small: strong anchor early (~= fixed sigma0, stable during codebook/
# GAN warmup) -> weak anchor late (fully heteroscedastic). Watch Wavelet/MAP Sigma2 Std
# (should grow as components differentiate) and scale ratio (drift => anchor too weak;
# raise map_kappa_end).
map_kappa_start: 800
map_kappa_end: 60
map_anneal_epochs: 10
map_var_floor: 0.001      # clamp on the learned variance (numerical safety)
map_var_ceil: 4.0
swd_queue_size: 0 # Size of the FIFO memory bank of past (detached) latents concatenated with the current batch before quantile matching, so the Gaussian-shape statistic sees more samples than fit in one forward/backward pass. 0 disables it.
queue_log_interval: 20 # Log the queue fill ratio to wandb every N training steps

perceptual_loss: "lpips"  # Options: "none", "lpips", "msssim_l1", "ffl", "msssim_ffl".
                     # Reconstruction objective is pixel_term + perceptual_weight * extra_term.
                     # "none"/"lpips"/"ffl": pixel_term = MSE. "msssim_l1"/"msssim_ffl": pixel_term
                     # REPLACES MSE with 0.84*(1-MS-SSIM) + 0.16*L1 (Zhao et al. 2017); the L1 term
                     # anchors absolute color/luminance, so adding MSE back would be redundant.
perceptual_weight: 1.0  # Weight of the additive extra_term (lpips/ffl only; ignored by none/msssim_l1).
ffl_alpha: 1.0  # Focal Frequency Loss focusing exponent (ffl/msssim_ffl only).
perceptual_batch_fraction: 1.0  # In (0, 1]. If < 1.0 and perceptual_loss="lpips", compute LPIPS on a
                     # random subset of the batch of this fraction to save memory (unbiased estimate).

# --- EMA codebook (ablation switch) ---
use_ema_codebook: true     # true = codes are EMA cluster means (VQ-VAE App. A.1 / VQ-VAE-2); codebook_loss becomes a diagnostic only. false = original gradient-trained codebook.
ema_decay: 0.99             # gamma: each batch contributes (1 - gamma); effective memory ~1/(1-gamma) batches
ema_eps: 1.0e-5             # Laplace smoothing of the EMA counts before the m_k / N_k division
ema_dead_threshold: 1.0     # codes with smoothed EMA count below this are restarted from random encoder vectors

# --- RQ + GMM wiring (ablation switches) ---
rq_depth: 2                 # >1 = residual quantization (Lee et al. 2022): D codes/location coarse-to-fine on a SHARED codebook, capacity D*log2(K) bits/location. 1 = plain VQ (previous behavior, bit-identical).
residual_continuous: true  # true = continuous branch encodes the quantization residual (GMM wiring). Requires combine_mode: residual_addition (z must literally be e_k + Delta).
component_prior: true      # true = SWD/variance-budget regularizers act on Delta whitened by the per-code sigma_k (EMA within-component std). Requires use_ema_codebook: true.
sigma2_floor: 0.5         # clamp on the per-component prior variance (anti-collapse valve; watch Codebook/Sigma2 At Floor Frac)
#before it was 0.001
sigma2_ceil: 10.0           # ceiling bounds the "inflate residuals to loosen your own prior" loophole

# --- Adversarial loss (VQGAN-style, Esser et al. 2021; ablation switch) ---
use_gan: true            # true = PatchGAN discriminator + hinge loss + VQGAN adaptive weight.
                          # This is the ingredient that separates VQGAN/SD-VAE/RAE perceptual
                          # quality from plain MSE/LPIPS training. NOTE: expect PSNR/SSIM to stay
                          # flat or dip slightly while LPIPS/rFID and visual sharpness improve --
                          # the GAN optimizes realism, not pixel fidelity.
gan_weight: 0.5           # scales the (adaptively weighted) generator term
gan_start_epoch: 6       # the G-term (adversarial gradients into the decoder) activates here, so the
                          # codebook EMA and the sigma0-anchored SWD settle before adversarial pressure
gan_d_start_epoch: 0      # the DISCRIMINATOR trains from this epoch on (real vs fake.detach()) without
                          # touching G -- by gan_start_epoch it is already a competent critic, so the
                          # first G-facing gradients are informed instead of a cold-start random shove
gan_ramp_epochs: 2        # the G-term weight ramps linearly 0 -> gan_weight over these epochs after
                          # gan_start_epoch, turning the activation step into a slope
gan_adaptive_weight: true # VQGAN lambda = ||grad recon|| / ||grad g|| at the decoder's last layer
gan_ndf: 64               # discriminator base channels (PatchGAN)
gan_layers: 3             # discriminator depth (receptive field ~70px)
gan_lr: 0.0001            # discriminator Adam lr (betas 0.5/0.9); NOT touched by lr_schedule

# --- Learning-rate schedule (Huh et al. 2023, Sec. 5.3) ---
lr: 0.0001                     # Learning rate
lr_schedule: "cosine"    # "constant" = previous behavior (fixed lr). "cosine" = linear warmup then cosine decay to lr * lr_min_ratio -- converts the late-training SSIM crawl at fixed lr into a cleaner final climb, and the warmup protects the k-means-seeded codebook from early covariate shift.
lr_warmup_epochs: 5
lr_min_ratio: 0.01       # final lr = 1% of base lr

do_wandb: True  # Whether to use Wandb for logging
use_amp: True  # Enable bf16 mixed precision (torch.autocast) to cut activation memory and allow a bigger batch size

# --- Validation FID/KID (logged to wandb as Val/rFID, Val/KID Mean) ---
val_fid: true            # true = compute reconstruction-FID + KID over the val set and log to wandb.
kid_subset_size: 100      # KID subset size; must be <= number of val images. Prefer KID over rFID for
                          # cross-paper claims at Imagenette scale (rFID is biased upward on small sets).
val_fid_device: "cuda"     # "cpu" = run FID/KID on CPU -> ZERO added GPU memory (slower). "cuda" = on the
                          # training GPU (fast, but the extra InceptionV3 + KID feature buffers can OOM a
                          # full card -- if you hit OutOfMemory during eval, keep this on "cpu").
val_fid_every_n_epochs: 1 # compute FID/KID every N epochs (and on the last) instead of every epoch, to
                          # cut the Inception cost. 1 = every epoch.

dataset_name: "imagenette"  # Dataset name: "cifar10", "mnist", or "imagenette"
resize_img: 256 #-1
batch_size: 42                # Batch size for training, 128 or 256 will give the SWD loss a much cleaner statistical signal to work with
do_early_stopping: False
epochs: 100                   # Number of training epochs
patience: 15                # Early stopping patience
checkpoints: "./checkpoints/swd_dualvae/"  # Checkpoint save path
train_ratio: 0.8            # Train ratio
val_ratio: 0.2
device: "cuda"              # Device
architecture: "cuda"        # Model architecture
dataset_path: "./datasets/imagenette2-320"  # Dataset path ./datasets
wandb_project: "dual_vae"  # Wandb Project Name
wandb_entity: "imagine-laboratory-conare"  # Wandb Project Entity
seed: 42

commitment_cost: 0.25
deterministic: True
cudnn_benchmark: False
num_workers: 4