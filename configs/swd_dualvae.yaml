model: "swd_dualvae"

downsample_factor: 2
swd_num_projections: 512 # (or 1024) The number of random 1D slices $K$.
variance_budget_lambda: 0.5 # (or 0.5) The target minimum variance threshold.
codebook_dim: 64
num_embeddings: 256

swd_weight: 1.0 # To scale the shape loss.
variance_weight: 1.0 # To scale the budget loss.

do_wandb: True  # Whether to use Wandb for logging

dataset_name: "cifar10" 
resize_img: -1
batch_size: 256                # Batch size for training, 128 or 256 will give the SWD loss a much cleaner statistical signal to work with
lr: 0.0001                     # Learning rate
do_early_stopping: False
epochs: 150                   # Number of training epochs
patience: 15                # Early stopping patience
checkpoints: "./checkpoints/swd_dualvae/"  # Checkpoint save path
train_ratio: 0.8            # Train ratio
val_ratio: 0.2
device: "cuda"              # Device
architecture: "cuda"        # Model architecture
dataset_path: "./datasets"  # Dataset path
wandb_project: "dual_vae"  # Wandb Project Name
wandb_entity: "imagine-laboratory-conare"  # Wandb Project Entity
seed: 42

commitment_cost: 0.25
deterministic: True
cudnn_benchmark: False
num_workers: 4