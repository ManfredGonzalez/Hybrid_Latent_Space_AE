model: "vae"

downsample_factor: 2
kl_beta: 0.001   # renamed from beta_kl_loss for clarity

do_wandb: true  # Whether to use Wandb for logging


dataset_name: "cifar10" # Options: pineapple, cifar10, mnist
batch_size: 60
lr: 0.0001
epochs: 2
patience: 15
do_early_stopping: False
checkpoints: "./checkpoints/vae/"
dataset_path: "./datasets"
train_ratio: 0.8
val_ratio: 0.2
resize_img: -1
augment: False
seed: 42


device: "cuda"
wandb_project: "dual_vae"
wandb_entity: "imagine-laboratory-conare"
deterministic: True
cudnn_benchmark: False
num_workers: 2
