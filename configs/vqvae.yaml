model: "vqvae"

downsample_factor: 8
latent_channels: 8      # C, shared by the codebook and the decoder
num_embeddings: 256
l2_normalize_codes: false   # flip to true if codebook perplexity stays low
initialize_from_data: True  # if true, seed the codebook via k-means on one encoder batch instead of uniform init

perceptual_loss: "none"  # Options: "none", "lpips", "msssim_l1", "ffl", "msssim_ffl".
                     # Reconstruction objective is pixel_term + perceptual_weight * extra_term.
                     # "none"/"lpips"/"ffl": pixel_term = MSE. "msssim_l1"/"msssim_ffl": pixel_term
                     # REPLACES MSE with 0.84*(1-MS-SSIM) + 0.16*L1 (Zhao et al. 2017); the L1 term
                     # anchors absolute color/luminance, so adding MSE back would be redundant.
perceptual_weight: 1.0  # Weight of the additive extra_term (lpips/ffl only; ignored by none/msssim_l1).
ffl_alpha: 1.0  # Focal Frequency Loss focusing exponent (ffl/msssim_ffl only).
perceptual_batch_fraction: 1.0  # In (0, 1]. If < 1.0 and perceptual_loss="lpips", compute LPIPS on a
                     # random subset of the batch of this fraction to save memory (unbiased estimate).

# --- EMA codebook (ablation switch) ---
use_ema_codebook: false     # true = codes are EMA cluster means (VQ-VAE App. A.1 / VQ-VAE-2); codebook_loss becomes a diagnostic only. false = original gradient-trained codebook.
ema_decay: 0.99             # gamma: each batch contributes (1 - gamma); effective memory ~1/(1-gamma) batches
ema_eps: 1.0e-5             # Laplace smoothing of the EMA counts before the m_k / N_k division
ema_dead_threshold: 1.0     # codes with smoothed EMA count below this are restarted from random encoder vectors

# --- Residual quantization (ablation switch) ---
rq_depth: 1                 # >1 = residual quantization (Lee et al. 2022): D codes/location coarse-to-fine on a SHARED codebook, capacity D*log2(K) bits/location. 1 = plain VQ (previous behavior, bit-identical).

# --- Adversarial loss (VQGAN-style, Esser et al. 2021; ablation switch) ---
use_gan: false            # true = PatchGAN discriminator + hinge loss + VQGAN adaptive weight.
gan_weight: 0.5           # scales the (adaptively weighted) generator term
gan_start_epoch: 6       # the G-term (adversarial gradients into the decoder) activates here
gan_d_start_epoch: 0      # the discriminator trains from this epoch (real vs fake.detach(), never touching G)
gan_ramp_epochs: 2        # G-term weight ramps linearly 0 -> gan_weight over these epochs after gan_start_epoch
gan_adaptive_weight: true # VQGAN lambda = ||grad recon|| / ||grad g|| at the decoder's last layer
gan_ndf: 64               # discriminator base channels (PatchGAN)
gan_layers: 3             # discriminator depth (receptive field ~70px)
gan_lr: 0.0001            # discriminator Adam lr (betas 0.5/0.9); NOT touched by lr_schedule

# --- Learning-rate schedule (Huh et al. 2023, Sec. 5.3) ---
lr: 0.0001                     # Learning rate
lr_schedule: "cosine"    # "constant" = previous behavior (fixed lr). "cosine" = linear warmup then cosine decay to lr * lr_min_ratio -- converts the late-training SSIM crawl at fixed lr into a cleaner final climb, and the warmup protects the k-means-seeded codebook from early covariate shift.
lr_warmup_epochs: 5
lr_min_ratio: 0.01       # final lr = 1% of base lr

do_wandb: true  # Whether to use Wandb for logging
use_amp: True  # Enable bf16 mixed precision (torch.autocast) to cut activation memory and allow a bigger batch size

# --- Validation FID/KID (logged to wandb as Val/rFID, Val/KID Mean) ---
val_fid: false            # true = compute reconstruction-FID + KID over the val set and log to wandb.
kid_subset_size: 100      # KID subset size; must be <= number of val images.
val_fid_device: "cpu"     # "cpu" = FID/KID on CPU (zero added GPU memory, slower). "cuda" = on GPU (can OOM).
val_fid_every_n_epochs: 5 # compute every N epochs (and on the last); 1 = every epoch.

dataset_name: "imagenette" # Options: pineapple, cifar10, mnist, imagenette
resize_img: 256
batch_size: 48                # Batch size for training
do_early_stopping: False
epochs: 200                   # Number of training epochs
patience: 15                # Early stopping patience
checkpoints: "./checkpoints/vqvae/"  # Checkpoint save path
train_ratio: 0.8            # Train ratio
val_ratio: 0.2
device: "cuda"              # Device
architecture: "cuda"        # Model architecture
dataset_path: "./datasets/imagenette2-320"  # Dataset path
wandb_project: "dual_vae"  # Wandb Project Name
wandb_entity: "imagine-laboratory-conare"  # Wandb Project Entity
seed: 42

commitment_cost: 0.25
deterministic: True
cudnn_benchmark: False
num_workers: 4